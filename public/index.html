<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- Primary Meta Tags -->
    <title>Portfolio — Gabriel Cacayan</title>
    <meta name="title" content="Portfolio — Gabriel Cacayan" />
    <meta
      name="description"
      content="As a web developer, my focus is on creating engaging and

                working with a range of technologies, but I particularly enjoy
                using Laravel and Vue, which I find to be powerful and effective
                tools for building high-quality web projects."
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://gabrielcacayan.com/" />
    <meta property="og:title" content="Portfolio — Gabriel Cacayan" />

      property="og:description"

                tools for building high-quality web projects."
    />
    <meta property="og:image" content="/meta-image.png" />
